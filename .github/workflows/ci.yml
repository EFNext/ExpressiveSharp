name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    env:
      CI: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDKs
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', 'Directory.Packages.props') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Test
        run: >-
          dotnet test --no-build -c Release
          --
          --report-trx --report-trx-filename results.trx
          --results-directory ./test-results
          --coverage
          --coverage-output-format cobertura
          --coverage-output coverage.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            ./test-results/*.trx
            ./test-results/**/coverage.xml
          retention-days: 14

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./test-results/**/coverage.xml
          fail_ci_if_error: false

      - name: Test report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Test Results
          path: ./test-results/*.trx
          reporter: dotnet-trx

      - name: Pack
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: >-
          dotnet pack --no-build -c Release
          -p:VersionSuffix=ci.${{ github.run_number }}
          --output ./packages

      - name: Upload NuGet packages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: |
            ./packages/*.nupkg
            ./packages/*.snupkg
          retention-days: 14

  container-tests:
    name: Container Tests (${{ matrix.database }})
    runs-on: ubuntu-latest
    needs: build-and-test
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        database: [SqlServer, Postgres, PomeloMySql, Cosmos]

    env:
      CI: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDKs
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ matrix.database }}-${{ hashFiles('**/*.csproj', 'Directory.Packages.props') }}
          restore-keys: |
            nuget-${{ runner.os }}-${{ matrix.database }}-
            nuget-${{ runner.os }}-

      - name: Restore
        run: >-
          dotnet restore
          tests/ExpressiveSharp.EntityFrameworkCore.IntegrationTests/ExpressiveSharp.EntityFrameworkCore.IntegrationTests.csproj
          -p:TestDatabase=${{ matrix.database }}

      - name: Build
        run: >-
          dotnet build --no-restore -c Release
          tests/ExpressiveSharp.EntityFrameworkCore.IntegrationTests/ExpressiveSharp.EntityFrameworkCore.IntegrationTests.csproj
          -p:TestDatabase=${{ matrix.database }}

      - name: Test
        run: |
          if [ "${{ matrix.database }}" = "Cosmos" ]; then
            # Run Cosmos tests one TFM at a time — the emulator is too
            # resource-heavy for multiple instances to run concurrently.
            for tfm in net8.0 net9.0 net10.0; do
              dotnet test --no-build -c Release \
                --project tests/ExpressiveSharp.EntityFrameworkCore.IntegrationTests \
                -p:TestDatabase=${{ matrix.database }} \
                -f "$tfm" \
                --results-directory ./test-results \
                -- \
                --report-trx --report-trx-filename "results-$tfm.trx"
            done
          else
            dotnet test --no-build -c Release \
              --project tests/ExpressiveSharp.EntityFrameworkCore.IntegrationTests \
              -p:TestDatabase=${{ matrix.database }} \
              --results-directory ./test-results \
              -- \
              --report-trx --report-trx-filename results.trx
          fi

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: container-test-results-${{ matrix.database }}
          path: ./test-results/*.trx
          retention-days: 14

      - name: Test report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Container Test Results (${{ matrix.database }})
          path: ./test-results/*.trx
          reporter: dotnet-trx
