name: Benchmarks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  benchmark:
    name: Run Benchmarks
    runs-on: ubuntu-latest

    env:
      CI: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', 'Directory.Packages.props') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Run benchmarks
        run: >-
          dotnet run -c Release
          --project benchmarks/ExpressiveSharp.Benchmarks/ExpressiveSharp.Benchmarks.csproj
          --
          --filter "*"
          --exporters json
          --join
          --job short
          --iterationCount 3
          --warmupCount 1

      - name: Find benchmark result
        id: find-result
        run: |
          file=$(find BenchmarkDotNet.Artifacts -name '*-report-full-compressed.json' | head -1)
          if [ -z "$file" ]; then
            echo "No benchmark result file found" >&2
            exit 1
          fi
          echo "file=$file" >> "$GITHUB_OUTPUT"

      - name: Store benchmark result
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: ExpressiveSharp Benchmarks
          tool: benchmarkdotnet
          output-file-path: ${{ steps.find-result.outputs.file }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          comment-on-alert: true
          alert-threshold: '120%'
          fail-on-alert: false
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: dev/bench
